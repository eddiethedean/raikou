name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e "./packages/raikou-core[dev]" -e "./packages/raikou[dev]"

      - name: Lint
        run: |
          ruff format --check packages/raikou-core/src packages/raikou/src packages/raikou-core/tests packages/raikou/tests
          ruff check packages/raikou-core/src packages/raikou/src packages/raikou-core/tests packages/raikou/tests

      - name: Type check
        run: |
          ty check packages/raikou-core/src packages/raikou/src packages/raikou-core/tests packages/raikou/tests

      - name: Test
        env:
          PYSPARK_PYTHON: python
          PYSPARK_DRIVER_PYTHON: python
        run: |
          pytest --cov=packages/raikou-core/src/raikou_core --cov=packages/raikou/src/raikou --cov-report=term-missing --cov-fail-under=90

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install -U pip
          python -m pip install mkdocs-material mkdocstrings[python] pymdown-extensions
          python -m pip install -e "./packages/raikou-core" -e "./packages/raikou"

      - name: Build docs (strict)
        run: |
          mkdocs build --strict

